<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnova AI - PWA Icon Generator</title>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #a78bfa;
            margin-bottom: 10px;
        }
        p {
            color: #9ca3af;
            margin-bottom: 30px;
        }
        .preview-container {
            display: flex;
            gap: 40px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .preview-box {
            text-align: center;
        }
        .preview-box canvas {
            border: 2px solid #2a2d3a;
            border-radius: 12px;
            background: #534AB7;
        }
        .preview-box p {
            margin-top: 10px;
            font-size: 14px;
        }
        button {
            background: #534AB7;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px;
            transition: all 0.2s;
        }
        button:hover {
            background: #7c3aed;
            transform: translateY(-2px);
        }
        .instructions {
            background: #13151e;
            border: 1px solid #2a2d3a;
            border-radius: 12px;
            padding: 20px;
            max-width: 600px;
            margin-top: 30px;
        }
        .instructions h3 {
            color: #a78bfa;
            margin-top: 0;
        }
        .instructions ol {
            color: #9ca3af;
            padding-left: 20px;
        }
        .instructions li {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <h1>Learnova AI - PWA Icon Generator</h1>
    <p>Click the buttons to download both icon sizes</p>

    <div class="preview-container">
        <div class="preview-box">
            <canvas id="canvas192" width="192" height="192"></canvas>
            <p>192x192px</p>
        </div>
        <div class="preview-box">
            <canvas id="canvas512" width="512" height="512"></canvas>
            <p>512x512px</p>
        </div>
    </div>

    <div>
        <button onclick="downloadIcon(192)">Download icon-192.png</button>
        <button onclick="downloadIcon(512)">Download icon-512.png</button>
        <button onclick="downloadBoth()">Download Both</button>
    </div>

    <div class="instructions">
        <h3>Next Steps:</h3>
        <ol>
            <li>Click "Download Both" to get both PNG files</li>
            <li>Place them in: <code style="background: #1e2130; padding: 2px 6px; border-radius: 4px;">learnova-web/public/icons/</code></li>
            <li>Name them: <code style="background: #1e2130; padding: 2px 6px; border-radius: 4px;">icon-192.png</code> and <code style="background: #1e2130; padding: 2px 6px; border-radius: 4px;">icon-512.png</code></li>
            <li>Done! Your PWA icons are ready 🎉</li>
        </ol>
    </div>

    <script>
        function drawLogo(canvas, size) {
            const ctx = canvas.getContext('2d');
            
            // Background gradient - richer purple
            const gradient = ctx.createRadialGradient(size * 0.3, size * 0.3, 0, size * 0.5, size * 0.5, size * 0.7);
            gradient.addColorStop(0, '#7c3aed');
            gradient.addColorStop(0.5, '#534AB7');
            gradient.addColorStop(1, '#4338a0');
            
            // Draw rounded rectangle background
            const radius = size * 0.22;
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.moveTo(radius, 0);
            ctx.lineTo(size - radius, 0);
            ctx.quadraticCurveTo(size, 0, size, radius);
            ctx.lineTo(size, size - radius);
            ctx.quadraticCurveTo(size, size, size - radius, size);
            ctx.lineTo(radius, size);
            ctx.quadraticCurveTo(0, size, 0, size - radius);
            ctx.lineTo(0, radius);
            ctx.quadraticCurveTo(0, 0, radius, 0);
            ctx.closePath();
            ctx.fill();
            
            // Add subtle inner glow
            const innerGlow = ctx.createRadialGradient(size * 0.5, size * 0.5, 0, size * 0.5, size * 0.5, size * 0.5);
            innerGlow.addColorStop(0, 'rgba(255, 255, 255, 0.1)');
            innerGlow.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = innerGlow;
            ctx.fillRect(0, 0, size, size);
            
            // Center position for logo
            const centerX = size * 0.5;
            const centerY = size * 0.5;
            const scale = size / 512; // Normalize to 512px design
            
            // Draw AI brain/learning symbol - interconnected nodes
            const nodeRadius = size * 0.04;
            const lineWidth = size * 0.015;
            
            // Node positions (forming a stylized brain/learning pattern)
            const nodes = [
                { x: centerX, y: centerY - size * 0.18 }, // Top
                { x: centerX - size * 0.15, y: centerY - size * 0.05 }, // Top-left
                { x: centerX + size * 0.15, y: centerY - size * 0.05 }, // Top-right
                { x: centerX - size * 0.18, y: centerY + size * 0.1 }, // Left
                { x: centerX + size * 0.18, y: centerY + size * 0.1 }, // Right
                { x: centerX, y: centerY + size * 0.2 }, // Bottom
                { x: centerX, y: centerY + size * 0.05 }, // Center
            ];
            
            // Draw connections (neural network)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.lineWidth = lineWidth;
            ctx.lineCap = 'round';
            
            const connections = [
                [0, 1], [0, 2], [1, 2], // Top triangle
                [1, 3], [2, 4], // Sides
                [3, 5], [4, 5], // Bottom triangle
                [1, 6], [2, 6], [3, 6], [4, 6], // To center
                [0, 6], [6, 5] // Vertical through center
            ];
            
            connections.forEach(([start, end]) => {
                ctx.beginPath();
                ctx.moveTo(nodes[start].x, nodes[start].y);
                ctx.lineTo(nodes[end].x, nodes[end].y);
                ctx.stroke();
            });
            
            // Draw nodes
            nodes.forEach((node, index) => {
                // Outer glow
                const glowGradient = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, nodeRadius * 2);
                glowGradient.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
                glowGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.arc(node.x, node.y, nodeRadius * 2, 0, Math.PI * 2);
                ctx.fill();
                
                // Node circle
                const nodeGradient = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, nodeRadius);
                nodeGradient.addColorStop(0, '#ffffff');
                nodeGradient.addColorStop(1, '#e0e0ff');
                ctx.fillStyle = nodeGradient;
                ctx.beginPath();
                ctx.arc(node.x, node.y, nodeRadius, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Add "L" letter overlay - subtle but recognizable
            const lPadding = size * 0.28;
            const lWidth = size * 0.08;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.lineWidth = lWidth;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            // Vertical line of L
            ctx.beginPath();
            ctx.moveTo(lPadding, lPadding);
            ctx.lineTo(lPadding, size - lPadding);
            ctx.stroke();
            
            // Horizontal line of L
            ctx.beginPath();
            ctx.moveTo(lPadding, size - lPadding);
            ctx.lineTo(size - lPadding, size - lPadding);
            ctx.stroke();
            
            // Add sparkle accents
            const sparkles = [
                { x: size * 0.15, y: size * 0.15, s: size * 0.03 },
                { x: size * 0.85, y: size * 0.2, s: size * 0.025 },
                { x: size * 0.8, y: size * 0.8, s: size * 0.02 },
            ];
            
            sparkles.forEach(sparkle => {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath();
                // 4-point star
                for (let i = 0; i < 8; i++) {
                    const angle = (i * Math.PI) / 4;
                    const r = i % 2 === 0 ? sparkle.s : sparkle.s * 0.4;
                    const x = sparkle.x + Math.cos(angle) * r;
                    const y = sparkle.y + Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
            });
        }

        function downloadIcon(size) {
            const canvas = document.getElementById(`canvas${size}`);
            const link = document.createElement('a');
            link.download = `icon-${size}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function downloadBoth() {
            downloadIcon(192);
            setTimeout(() => downloadIcon(512), 500);
        }

        // Draw both icons on page load
        window.onload = function() {
            drawLogo(document.getElementById('canvas192'), 192);
            drawLogo(document.getElementById('canvas512'), 512);
        };
    </script>
</body>
</html>
