use_default_settings: true

general:
  instance_name: "Learnova AI Search"
  description: "Private search instance for Learnova AI platform"
  contact_url: ~
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "en"
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "learnova-ai-searxng-secret-key-2025"
  limiter: false
  image_proxy: false

ui:
  static_use_hash: true
  default_theme: "simple"
  default_locale: "en"
  theme_args:
    simple_style: "auto"

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false
  
  - name: bing
    engine: bing
    shortcut: b
    disabled: false
  
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
  
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false
  
  - name: brave
    engine: brave
    shortcut: br
    disabled: false
