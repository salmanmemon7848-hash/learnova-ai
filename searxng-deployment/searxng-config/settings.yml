use_default_settings: true

general:
  instance_name: "Learnova AI Search"
  debug: false
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "en"
  formats:
    - html
    - json

server:
  secret_key: "learnova-ai-secret-key-2025-change-this"
  limiter: false
  image_proxy: false

ui:
  static_use_hash: true
  default_theme: "simple"

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false
  
  - name: bing
    engine: bing
    shortcut: b
    disabled: false
  
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
